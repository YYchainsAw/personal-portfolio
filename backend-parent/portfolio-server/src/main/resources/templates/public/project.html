<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${locale}" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title th:text="${project.seoTitle}">Project</title>
  <meta name="description" th:content="${project.seoDescription}" content="Project">
  <link rel="canonical" th:href="${canonical}" href="https://yychainsaw.xyz/zh-CN">
  <link rel="alternate" hreflang="zh-CN" th:href="${zhUrl}" href="https://yychainsaw.xyz/zh-CN">
  <link rel="alternate" hreflang="en" th:href="${enUrl}" href="https://yychainsaw.xyz/en">
  <meta property="og:type" content="article">
  <meta property="og:title" th:content="${project.seoTitle}" content="Project">
  <meta property="og:description" th:content="${project.seoDescription}" content="Project">
  <meta property="og:url" th:content="${canonical}" content="https://yychainsaw.xyz/zh-CN">
  <meta property="og:image" th:if="${ogImage != null}" th:content="${ogImage}">
  <link th:each="css : ${assets.css}" rel="stylesheet" th:href="${css}">
  <script type="application/ld+json" data-portfolio-seo th:utext="${structuredData}"></script>
</head>
<body>
  <div id="app">
  <a href="#main-content" th:text="${site.accessibility.skip}">Skip to content</a>

  <header>
    <nav th:attr="aria-label=${site.accessibility.primaryNav}" aria-label="Primary navigation">
      <a th:href="@{/{locale}(locale=${locale})}" th:text="${site.work.title}">Projects</a>
      <a th:href="${zhUrl}" hreflang="zh-CN" lang="zh-CN"
         th:attr="aria-current=${locale == 'zh-CN'} ? 'page' : null">中文</a>
      <a th:href="${enUrl}" hreflang="en" lang="en"
         th:attr="aria-current=${locale == 'en'} ? 'page' : null">English</a>
    </nav>
  </header>

    <main id="main-content" tabindex="-1">
      <header>
        <p th:text="${project.eyebrow}">Project</p>
        <h1 th:text="${project.title}">Project title</h1>
        <p th:text="${project.summary}">Project summary</p>

        <figure th:if="${cover != null}">
          <img th:src="${cover.src}"
               th:srcset="${cover.srcset}"
               th:alt="${cover.alt}"
               th:width="${cover.width}"
               th:height="${cover.height}"
               fetchpriority="high">
          <figcaption th:if="${!#strings.isEmpty(cover.caption)
              or !#strings.isEmpty(cover.credit)}">
            <span th:if="${!#strings.isEmpty(cover.caption)}"
                  th:text="${cover.caption}"></span>
            <a th:if="${!#strings.isEmpty(cover.credit)
                    and !#strings.isEmpty(cover.sourceUrl)}"
               th:href="${cover.sourceUrl}"
               th:text="${cover.credit}"
               target="_blank" rel="noopener noreferrer"></a>
            <span th:if="${!#strings.isEmpty(cover.credit)
                    and #strings.isEmpty(cover.sourceUrl)}"
                  th:text="${cover.credit}"></span>
          </figcaption>
        </figure>

        <ul th:if="${!project.tags.isEmpty()}" aria-label="Tags">
          <li th:each="tag : ${project.tags}" th:text="${tag}">Tag</li>
        </ul>
        <ul th:if="${!project.skills.isEmpty()}" aria-label="Skills">
          <li th:each="skill : ${project.skills}" th:text="${skill}">Skill</li>
        </ul>
      </header>

      <div th:each="block : ${project.blocks}"
           th:switch="${block.type}"
           th:attr="data-block-type=${block.type}">
        <section th:case="'MARKDOWN'" th:utext="${block.payload.html}"></section>

        <figure th:case="'IMAGE'">
          <img th:src="${block.payload.media.src}"
               th:srcset="${block.payload.media.srcset}"
               th:alt="${block.payload.media.alt}"
               th:width="${block.payload.media.width}"
               th:height="${block.payload.media.height}"
               loading="lazy">
          <figcaption th:if="${!#strings.isEmpty(block.payload.media.caption)
              or !#strings.isEmpty(block.payload.media.credit)
              or #strings.startsWith(block.payload.media.sourceUrl, 'https://')}">
            <span th:if="${!#strings.isEmpty(block.payload.media.caption)}"
                  th:text="${block.payload.media.caption}"></span>
            <a th:if="${!#strings.isEmpty(block.payload.media.credit)
                    and #strings.startsWith(block.payload.media.sourceUrl, 'https://')}"
               th:href="${block.payload.media.sourceUrl}"
               th:text="${block.payload.media.credit}"
               target="_blank" rel="noopener noreferrer"></a>
            <span th:if="${!#strings.isEmpty(block.payload.media.credit)
                    and !#strings.startsWith(block.payload.media.sourceUrl, 'https://')}"
                  th:text="${block.payload.media.credit}"></span>
            <a th:if="${#strings.isEmpty(block.payload.media.credit)
                    and #strings.startsWith(block.payload.media.sourceUrl, 'https://')}"
               th:href="${block.payload.media.sourceUrl}"
               th:text="${locale == 'zh-CN'} ? '来源' : 'Source'"
               target="_blank" rel="noopener noreferrer">Source</a>
          </figcaption>
        </figure>

        <div th:case="'GALLERY'" role="group" aria-label="Gallery">
          <figure th:each="item : ${block.payload.media}">
            <img th:src="${item.src}"
                 th:srcset="${item.srcset}"
                 th:alt="${item.alt}"
                 th:width="${item.width}"
                 th:height="${item.height}"
                 loading="lazy">
            <figcaption th:if="${!#strings.isEmpty(item.caption)
                or !#strings.isEmpty(item.credit)
                or #strings.startsWith(item.sourceUrl, 'https://')}">
              <span th:if="${!#strings.isEmpty(item.caption)}"
                    th:text="${item.caption}"></span>
              <a th:if="${!#strings.isEmpty(item.credit)
                      and #strings.startsWith(item.sourceUrl, 'https://')}"
                 th:href="${item.sourceUrl}"
                 th:text="${item.credit}"
                 target="_blank" rel="noopener noreferrer"></a>
              <span th:if="${!#strings.isEmpty(item.credit)
                      and !#strings.startsWith(item.sourceUrl, 'https://')}"
                    th:text="${item.credit}"></span>
              <a th:if="${#strings.isEmpty(item.credit)
                      and #strings.startsWith(item.sourceUrl, 'https://')}"
                 th:href="${item.sourceUrl}"
                 th:text="${locale == 'zh-CN'} ? '来源' : 'Source'"
                 target="_blank" rel="noopener noreferrer">Source</a>
            </figcaption>
          </figure>
        </div>

        <section th:case="'VIDEO'">
          <figure th:if="${block.payload.cover != null}">
            <img th:src="${block.payload.cover.src}"
                 th:srcset="${block.payload.cover.srcset}"
                 th:alt="${block.payload.cover.alt}"
                 th:width="${block.payload.cover.width}"
                 th:height="${block.payload.cover.height}"
                 loading="lazy">
            <figcaption th:if="${!#strings.isEmpty(block.payload.cover.caption)
                or !#strings.isEmpty(block.payload.cover.credit)
                or #strings.startsWith(block.payload.cover.sourceUrl, 'https://')}">
              <span th:if="${!#strings.isEmpty(block.payload.cover.caption)}"
                    th:text="${block.payload.cover.caption}"></span>
              <a th:if="${!#strings.isEmpty(block.payload.cover.credit)
                      and #strings.startsWith(block.payload.cover.sourceUrl, 'https://')}"
                 th:href="${block.payload.cover.sourceUrl}"
                 th:text="${block.payload.cover.credit}"
                 target="_blank" rel="noopener noreferrer"></a>
              <span th:if="${!#strings.isEmpty(block.payload.cover.credit)
                      and !#strings.startsWith(block.payload.cover.sourceUrl, 'https://')}"
                    th:text="${block.payload.cover.credit}"></span>
              <a th:if="${#strings.isEmpty(block.payload.cover.credit)
                      and #strings.startsWith(block.payload.cover.sourceUrl, 'https://')}"
                 th:href="${block.payload.cover.sourceUrl}"
                 th:text="${locale == 'zh-CN'} ? '来源' : 'Source'"
                 target="_blank" rel="noopener noreferrer">Source</a>
            </figcaption>
          </figure>
          <h2>
            <a th:href="${block.payload.embedUrl}"
               th:text="${block.payload.title}"
               target="_blank" rel="noopener noreferrer">Video</a>
          </h2>
          <p th:text="${block.payload.description}">Video description</p>
        </section>

        <section th:case="'CODE'">
          <h2 th:if="${!#strings.isEmpty(block.payload.title)}"
              th:text="${block.payload.title}">Code</h2>
          <p th:if="${!#strings.isEmpty(block.payload.description)}"
             th:text="${block.payload.description}">Code description</p>
          <pre><code th:text="${block.payload.code}"></code></pre>
        </section>

        <blockquote th:case="'QUOTE'">
          <p th:text="${block.payload.quote}">Quote</p>
          <cite th:text="${block.payload.source}">Source</cite>
        </blockquote>

        <dl th:case="'METRICS'">
          <th:block th:each="metric : ${block.payload.metrics}">
            <dt th:text="${metric.label}">Metric</dt>
            <dd>
              <span th:text="${metric.value}">Value</span><span th:text="${metric.suffix}"></span>
            </dd>
          </th:block>
        </dl>

        <section th:case="'DOWNLOAD'">
          <a th:href="${block.payload.href}"
             th:text="${block.payload.label}"
             rel="noreferrer">Download</a>
          <p th:if="${!#strings.isEmpty(block.payload.description)}"
             th:text="${block.payload.description}">Download description</p>
          <p th:if="${block.payload.mimeType != null and block.payload.byteSize != null}">
            <span th:text="${block.payload.mimeType}">application/octet-stream</span>
            <span aria-hidden="true"> · </span>
            <span th:text="${block.payload.byteSize + ' bytes'}">0 bytes</span>
          </p>
        </section>

        <section th:case="'LINK'">
          <a th:href="${block.payload.href}"
             th:text="${block.payload.label}"
             th:target="${block.payload.openNewTab} ? '_blank' : null"
             th:rel="${block.payload.openNewTab} ? 'noopener noreferrer' : null">Link</a>
          <p th:if="${!#strings.isEmpty(block.payload.description)}"
             th:text="${block.payload.description}">Link description</p>
        </section>
      </div>
    </main>
  </div>

  <template id="__PORTFOLIO_DATA__" th:utext="${initialJson}"></template>
  <script type="module" th:src="${assets.entryJs}"></script>
</body>
</html>
