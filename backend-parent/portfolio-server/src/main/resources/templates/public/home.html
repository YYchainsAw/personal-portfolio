<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${locale}" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080d12">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title th:text="${site.seo.title}">Portfolio</title>
  <meta name="description" th:content="${site.seo.description}" content="Portfolio">
  <link rel="canonical" th:href="${canonical}" href="https://yychainsaw.xyz/zh-CN">
  <link rel="alternate" hreflang="zh-CN" th:href="${zhUrl}" href="https://yychainsaw.xyz/zh-CN">
  <link rel="alternate" hreflang="en" th:href="${enUrl}" href="https://yychainsaw.xyz/en">
  <meta property="og:type" content="website">
  <meta property="og:title" th:content="${site.seo.title}" content="Portfolio">
  <meta property="og:description" th:content="${site.seo.description}" content="Portfolio">
  <meta property="og:url" th:content="${canonical}" content="https://yychainsaw.xyz/zh-CN">
  <meta property="og:image" th:if="${ogImage != null}" th:content="${ogImage}">
  <link th:each="css : ${assets.css}" rel="stylesheet" th:href="${css}">
  <script type="application/ld+json" data-portfolio-seo th:utext="${structuredData}"></script>
</head>
<body>
  <div id="app">
  <a class="skip-link" href="#main-content" th:text="${site.accessibility.skip}">Skip to content</a>

  <header class="public-home-header public-home-header--ssr" data-public-ssr>
    <div class="public-home-header__inner">
      <a class="brand" th:href="@{/{locale}(locale=${locale})}">
        <span class="brand__name" th:text="${site.identity.displayName}">Portfolio</span>
        <span class="brand__secondary" th:text="${site.identity.secondaryName}">Game development</span>
      </a>
      <nav class="public-home-header__locales"
           th:attr="aria-label=${site.accessibility.primaryNav}"
           aria-label="Primary navigation">
      <a th:href="${zhUrl}" hreflang="zh-CN" lang="zh-CN"
         th:attr="aria-current=${locale == 'zh-CN'} ? 'page' : null">中文</a>
      <a th:href="${enUrl}" hreflang="en" lang="en"
         th:attr="aria-current=${locale == 'en'} ? 'page' : null">English</a>
      </nav>
    </div>
  </header>

    <main id="main-content" class="public-home-page public-home-page--ssr" data-public-ssr tabindex="-1">
      <section class="public-home-hero" aria-labelledby="hero-title">
        <p class="public-home-eyebrow" th:text="${site.hero.eyebrow}">Portfolio</p>
        <h1 id="hero-title" th:text="${site.hero.displayName}">Portfolio</h1>
        <p class="public-home-introduction" th:text="${site.hero.introduction}">Introduction</p>

        <figure class="public-home-hero__media" th:if="${site.hero.media != null}">
          <img th:src="${site.hero.media.src}"
               th:srcset="${site.hero.media.srcset}"
               th:alt="${site.hero.media.alt}"
               th:width="${site.hero.media.width}"
               th:height="${site.hero.media.height}"
               fetchpriority="high">
          <figcaption th:if="${!#strings.isEmpty(site.hero.media.caption)
              or !#strings.isEmpty(site.hero.credit)}">
            <span th:if="${!#strings.isEmpty(site.hero.media.caption)}"
                  th:text="${site.hero.media.caption}"></span>
            <a th:if="${!#strings.isEmpty(site.hero.credit)
                    and #strings.startsWith(site.hero.sourceUrl, 'https://')}"
               th:href="${site.hero.sourceUrl}"
               th:text="${site.hero.credit}"
               target="_blank" rel="noopener noreferrer"></a>
            <span th:if="${!#strings.isEmpty(site.hero.credit)
                    and !#strings.startsWith(site.hero.sourceUrl, 'https://')}"
                  th:text="${site.hero.credit}"></span>
          </figcaption>
        </figure>
      </section>

      <section class="public-home-projects" aria-labelledby="projects-title">
        <p class="public-home-eyebrow" th:text="${site.work.label}">Work</p>
        <h2 id="projects-title" th:text="${site.work.title}">Projects</h2>
        <p class="public-home-introduction" th:text="${site.work.introduction}">Selected projects</p>
        <ul class="public-home-project-list">
          <li class="public-home-project-list__item" th:each="project : ${catalog}">
            <article class="public-home-project-card">
              <figure class="public-home-project-card__media" th:if="${project.cover != null}">
                <img th:src="${project.cover.src}"
                     th:srcset="${project.cover.srcset}"
                     th:alt="${project.cover.alt}"
                     th:width="${project.cover.width}"
                     th:height="${project.cover.height}"
                     loading="lazy">
                <figcaption th:if="${!#strings.isEmpty(project.cover.caption)
                    or !#strings.isEmpty(project.cover.credit)}">
                  <span th:if="${!#strings.isEmpty(project.cover.caption)}"
                        th:text="${project.cover.caption}"></span>
                  <a th:if="${!#strings.isEmpty(project.cover.credit)
                          and !#strings.isEmpty(project.cover.sourceUrl)}"
                     th:href="${project.cover.sourceUrl}"
                     th:text="${project.cover.credit}"
                     target="_blank" rel="noopener noreferrer"></a>
                  <span th:if="${!#strings.isEmpty(project.cover.credit)
                          and #strings.isEmpty(project.cover.sourceUrl)}"
                        th:text="${project.cover.credit}"></span>
                </figcaption>
              </figure>
              <p class="public-home-project-card__eyebrow" th:text="${project.eyebrow}">Project</p>
              <h3>
                <a th:href="@{/{locale}/projects/{slug}(locale=${locale},slug=${project.slug})}"
                   th:text="${project.title}">Project title</a>
              </h3>
              <p th:text="${project.summary}">Project summary</p>
              <ul th:if="${!project.tags.isEmpty()}"
                  th:attr="aria-label=${site.accessibility.projectTags}">
                <li th:each="tag : ${project.tags}" th:text="${tag}">Tag</li>
              </ul>
            </article>
          </li>
        </ul>
      </section>
    </main>
  </div>

  <template id="__PORTFOLIO_DATA__" th:utext="${initialJson}"></template>
  <script type="module" th:src="${assets.entryJs}"></script>
</body>
</html>
