spring:
  application:
    name: portfolio-server
  datasource:
    url: ${PORTFOLIO_DB_URL}
    username: ${PORTFOLIO_DB_RUNTIME_USER}
    password: ${PORTFOLIO_DB_RUNTIME_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 10000
      data-source-properties:
        ApplicationName: portfolio-server
  flyway:
    enabled: true
    url: ${PORTFOLIO_DB_MIGRATOR_URL:${PORTFOLIO_DB_URL}}
    user: ${PORTFOLIO_DB_MIGRATOR_USER}
    password: ${PORTFOLIO_DB_MIGRATOR_PASSWORD}
    default-schema: portfolio
    schemas: portfolio
    create-schemas: true
    locations: classpath:db/migration
    validate-migration-naming: true
  session:
    store-type: jdbc
    timeout: 30m
    jdbc:
      initialize-schema: never
      cleanup-cron: "-"
      table-name: SPRING_SESSION
      flush-mode: immediate
      save-mode: on-set-attribute
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 32MB

server:
  address: ${PORTFOLIO_BIND_ADDRESS:127.0.0.1}
  port: ${PORTFOLIO_PORT:18080}
  servlet:
    session:
      timeout: 30m
      tracking-modes: cookie
      cookie:
        name: PORTFOLIO_SESSION
        path: /
        http-only: true
        secure: ${PORTFOLIO_SESSION_COOKIE_SECURE:true}
        same-site: strict

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

portfolio:
  render:
    release-id: ${PORTFOLIO_RELEASE_ID}
    vite-manifest: ${PORTFOLIO_VITE_MANIFEST:classpath:/public-assets/.vite/manifest.json}
    template-schema-version: 1
    public-base-url: ${PORTFOLIO_PUBLIC_BASE_URL:https://yychainsaw.xyz}
  preview:
    hmac-key: ${PORTFOLIO_PREVIEW_HMAC_KEY:}
    ttl: PT10M
  jobs:
    retention:
      enabled: ${PORTFOLIO_JOBS_RETENTION_ENABLED:false}
      batch-size: ${PORTFOLIO_JOBS_RETENTION_BATCH_SIZE:500}
      max-batches: ${PORTFOLIO_JOBS_RETENTION_MAX_BATCHES:10}
  media:
    cleanup:
      enabled: ${PORTFOLIO_MEDIA_CLEANUP_ENABLED:false}
    ingest:
      transaction-timeout: ${PORTFOLIO_MEDIA_INGEST_TRANSACTION_TIMEOUT:PT30S}
    local-publication:
      max-concurrency: ${PORTFOLIO_LOCAL_PUBLICATION_MAX_CONCURRENCY:2}
      connection-headroom: ${PORTFOLIO_LOCAL_PUBLICATION_CONNECTION_HEADROOM:2}
      acquire-timeout: ${PORTFOLIO_LOCAL_PUBLICATION_ACQUIRE_TIMEOUT:PT10S}
      operation-timeout: ${PORTFOLIO_LOCAL_PUBLICATION_OPERATION_TIMEOUT:PT2M}
  security:
    totp:
      active-key-version: ${PORTFOLIO_TOTP_ACTIVE_KEY_VERSION}
      key-ring: ${PORTFOLIO_TOTP_KEY_RING}
      issuer: yychainsaw.xyz
      pending-lifetime: PT5M
      max-second-factor-attempts: 5
    session:
      absolute-lifetime: PT8H
      cleanup-interval: PT1M
  rate-limit:
    maximum-subjects: 10000
    policies:
      admin-login:
        limit: 5
        window: PT15M
      admin-security:
        limit: 10
        window: PT15M
      public-contact:
        limit: 5
        window: PT15M
      public-events:
        limit: 60
        window: PT1M
  web:
    allow-development-cors: ${PORTFOLIO_ALLOW_DEVELOPMENT_CORS:false}
    development-origin: ${PORTFOLIO_ADMIN_DEV_ORIGIN:http://localhost:5174}
  recovery:
    directory: ${PORTFOLIO_RECOVERY_DIRECTORY:${user.dir}/runtime/recovery}
    pg-dump-bin: ${PORTFOLIO_PG_DUMP_BIN:pg_dump}
    username: ${PORTFOLIO_DB_MIGRATOR_USER}
    password: ${PORTFOLIO_DB_MIGRATOR_PASSWORD}
    timeout: ${PORTFOLIO_PG_DUMP_TIMEOUT:PT2M}

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  structured:
    format:
      console: logstash
portfolio:
  media:
    cleanup:
      enabled: false
