portfolio:
  release-id: test
  render:
    release-id: ${PORTFOLIO_RELEASE_ID:test-release}
    vite-manifest: ${PORTFOLIO_VITE_MANIFEST:classpath:/vite/manifest.json}
  preview:
    hmac-key: ICEiIyQlJicoKSorLC0uLzAxMjM0NTY3ODk6Ozw9Pj8=
    ttl: PT10M
  jobs:
    worker-enabled: false
  storage:
    default-provider: LOCAL
    local:
      root: ${PORTFOLIO_LOCAL_STORAGE:../runtime/test-media}
  media:
    staging-cleanup:
      enabled: false
    cleanup:
      enabled: false
      cooling-period: 30d
